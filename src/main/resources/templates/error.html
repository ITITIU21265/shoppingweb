<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>StyleHub Error</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="form-page-body">
    <main class="form-page-card">
      <header>
        <p class="eyebrow">Something went wrong</p>
        <h1>We could not complete that request.</h1>
        <p class="form-alert"
           th:if="${errorMessage}"
           th:text="${errorMessage}">
          Please return to the catalog and try again.
        </p>
      </header>
      <a class="btn btn-primary" href="/catalog">Back to Catalog</a>
    </main>
  </body>
</html>
