<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Reset Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="form-page-body">
    <main class="form-page-card">
      <a class="text-link" href="/auth/login">Back to sign in</a>
      <header>
        <p class="eyebrow">Reset access</p>
        <h1>Create a new password</h1>
        <p>Enter the 6-digit OTP sent to your email and choose a new password. The OTP expires in 15 minutes.</p>
      </header>

      <div th:if="${errorMessage}" class="form-alert" th:text="${errorMessage}"></div>
      <div th:if="${successMessage}" class="form-alert success" th:text="${successMessage}"></div>

      <form class="stack-form" method="post" th:object="${resetPasswordRequest}" action="/auth/reset-password">
        <label class="field">
          <span>OTP Code</span>
          <input th:field="*{resetToken}" type="text" inputmode="numeric" autocomplete="one-time-code" placeholder="Enter 6-digit OTP" />
        </label>
        <label class="field">
          <span>New Password</span>
          <input th:field="*{newPassword}" type="password" placeholder="At least 6 characters" />
        </label>
        <label class="field">
          <span>Confirm Password</span>
          <input th:field="*{confirmPassword}" type="password" placeholder="Repeat the new password" />
        </label>
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-primary btn-full" type="submit">Reset Password</button>
      </form>
    </main>
  </body>
</html>
