<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${product.name} + ' | StyleHub'">StyleHub Product</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="app-body">
    <header class="app-header">
      <div class="brand-lockup">
        <div class="brand-mark"></div>
        <div>
          <a class="brand-name" href="/catalog">StyleHub</a>
          <p class="brand-subtitle">Product Detail</p>
        </div>
      </div>

      <nav class="main-nav">
        <a class="is-active" href="/catalog">Catalog</a>
        <a th:if="${signedIn}" href="/dashboard">Dashboard</a>
      </nav>

      <div class="header-user">
        <a th:if="${!signedIn}" class="btn btn-primary" href="/auth/login">Sign In</a>
        <form th:if="${signedIn}" method="post" action="/auth/logout">
          <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
          <button class="btn btn-ghost" type="submit">Sign Out</button>
        </form>
      </div>
    </header>

    <main class="page-shell">
      <a class="text-link" href="/catalog">Back to catalog</a>
      <section class="panel-card" style="display:grid; grid-template-columns: minmax(320px, 460px) 1fr; gap:24px;">
        <img th:src="${product.imageUrl}" th:alt="${product.name}" style="width:100%; border-radius:24px; object-fit:cover; aspect-ratio:4 / 5;" />
        <div style="display:grid; gap:18px; align-content:start;">
          <p class="eyebrow" th:text="${product.category.displayName}">Category</p>
          <h1 th:text="${product.name}">Product Name</h1>
          <p class="price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</p>
          <p class="lead" th:text="${product.description}">Description</p>
          <div class="hero-badge">
            <span>Catalog slug</span>
            <strong th:text="${product.slug}">product-slug</strong>
          </div>
        </div>
      </section>
    </main>
  </body>
</html>
