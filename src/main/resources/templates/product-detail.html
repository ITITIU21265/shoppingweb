<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title th:text="${product.name} + ' | StyleHub'">StyleHub Product</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
    <meta name="_csrf" th:content="${_csrf.token}"/>
    <meta name="_csrf_header" th:content="${_csrf.headerName}"/>
    <script src="/js/interactions.js" defer></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        corePlugins: {
          preflight: false
        }
      };
    </script>
  </head>
  <body class="app-body">
    <header class="app-header">
      <div class="brand-lockup">
        <div class="brand-mark"></div>
        <div>
          <a class="brand-name" href="/catalog">StyleHub</a>
          <p class="brand-subtitle">Product Detail</p>
        </div>
      </div>

      <nav class="main-nav">
        <a class="is-active" href="/catalog">Catalog</a>
        <a th:if="${hasDashboardAccess}" th:href="${dashboardUrl}">Dashboard</a>
      </nav>

      <div class="header-user">
        <a th:if="${signedIn}" class="header-shortcut" href="/cart">
          <span>Cart</span>
          <strong th:text="${cartItemCount}">0</strong>
        </a>
        <a th:if="${!signedIn}" class="btn btn-primary" href="/auth/login">Sign In</a>
        <details th:if="${signedIn}" class="user-menu">
          <summary class="user-chip" th:text="${#strings.substring(currentUser.fullName ?: currentUser.username, 0, 1)}">U</summary>
          <div class="user-menu-panel">
            <a href="/profile">My Account</a>
            <a href="/orders">Orders</a>
            <a th:if="${currentUser != null and currentUser.role == 'CUSTOMER'}" href="/supplier/register">Register as a Seller</a>
            <form method="post" action="/auth/logout">
              <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
              <button type="submit">Sign Out</button>
            </form>
          </div>
        </details>
      </div>
    </header>

    <main class="page-shell">
      <a class="text-link" href="/catalog">Back to catalog</a>
      <section class="panel-card" style="display:grid; grid-template-columns: minmax(320px, 460px) 1fr; gap:24px;">
        <img th:src="${product.imageUrl}" th:alt="${product.name}" style="width:100%; border-radius:24px; object-fit:cover; aspect-ratio:4 / 5;" />
        <div style="display:grid; gap:18px; align-content:start;">
          <p class="eyebrow" th:text="${product.category.displayName}">Category</p>
          <h1 th:text="${product.name}">Product Name</h1>
          <p class="price" th:text="'$' + ${#numbers.formatDecimal(product.price, 1, 2)}">$0.00</p>
          <p class="lead" th:text="${product.description}">Description</p>
          <div class="detail-actions">
            <button th:if="${signedIn}"
                    class="btn btn-ghost"
                    type="button"
                    data-action="save"
                    th:data-product-id="${product.id}"
                    data-save-text="Save ❤"
                    data-saved-text="Saved ❤"
                    th:text="${savedProductIds.contains(product.id)} ? 'Saved ❤' : 'Save ❤'">
              Save ❤
            </button>
            <a th:if="${!signedIn}" class="btn btn-ghost" href="/auth/login">Save ❤</a>

            <button th:if="${signedIn}"
                    class="btn btn-primary"
                    type="button"
                    data-action="add-to-cart"
                    th:data-product-id="${product.id}">
              Add to Cart
            </button>
            <a th:if="${!signedIn}" class="btn btn-primary" href="/auth/login">Add to Cart</a>
          </div>
          <div class="hero-badge">
            <span>Catalog slug</span>
            <strong th:text="${product.slug}">product-slug</strong>
          </div>
        </div>
      </section>

      <div th:if="${relatedProducts != null and !relatedProducts.isEmpty()}">
        <section class="mt-16 border-t border-gray-200 pt-10">
          <div class="mb-6 flex items-center justify-between gap-4">
            <h2 class="text-2xl font-bold text-gray-900">You Might Also Like</h2>
            <p class="text-sm italic text-gray-500">✨ Recommended by StyleHub AI</p>
          </div>

          <div class="grid grid-cols-1 gap-x-6 gap-y-10 sm:grid-cols-2 lg:grid-cols-4">
            <article class="group" th:each="related : ${relatedProducts}">
              <a th:href="@{'/products/' + ${related.slug}}" class="block overflow-hidden rounded-lg bg-gray-100">
                <img
                  th:src="${related.imageUrl != null ? related.imageUrl : '/images/placeholder.jpg'}"
                  th:alt="${related.name}"
                  class="aspect-square w-full object-cover transition-opacity duration-200 group-hover:opacity-75"
                />
              </a>
              <div class="mt-4 flex justify-between gap-4">
                <div>
                  <h3 class="text-sm text-gray-700" th:text="${related.name}">Product Name</h3>
                  <p class="mt-1 text-sm text-gray-500" th:text="${related.category}">Category</p>
                </div>
                <p class="text-sm font-medium text-gray-900" th:text="${related.price} + ' ' + ${related.currency}">$0.00</p>
              </div>
            </article>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
