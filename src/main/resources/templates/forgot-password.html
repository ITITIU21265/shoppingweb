<!DOCTYPE html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Forgot Password</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=Manrope:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/css/style.css" />
  </head>
  <body class="form-page-body">
    <main class="form-page-card">
      <a class="text-link" href="/auth/login">Back to sign in</a>
      <header>
        <p class="eyebrow">Account recovery</p>
        <h1>Forgot your password?</h1>
        <p>Enter your email address and the server will generate a reset token if the account exists.</p>
      </header>

      <div th:if="${errorMessage}" class="form-alert" th:text="${errorMessage}"></div>
      <div th:if="${successMessage}" class="form-alert success" th:text="${successMessage}"></div>

      <form class="stack-form" method="post" th:object="${forgotPasswordRequest}" action="/auth/forgot-password">
        <label class="field">
          <span>Email</span>
          <input th:field="*{email}" type="email" placeholder="you@example.com" />
        </label>
        <input type="hidden" th:if="${_csrf != null}" th:name="${_csrf.parameterName}" th:value="${_csrf.token}" />
        <button class="btn btn-primary btn-full" type="submit">Send Reset Request</button>
      </form>
    </main>
  </body>
</html>
