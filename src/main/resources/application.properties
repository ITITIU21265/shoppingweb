spring.application.name=shoppingweb
server.port=8080

#database
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/clothing_shop?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:root}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# Seed demo data only when explicitly enabled
app.seed.system-data=false

# JPA
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
# Local fallback prevents startup failure during development.
# Override JWT_SECRET in production with a strong 256-bit+ secret.
jwt.secret=${JWT_SECRET:devOnlyJwtSecretForLocalDevelopmentMustBeOverriddenInProduction256Bits}
jwt.expiration=${JWT_EXPIRATION:86400000}

# Security
# Logging
logging.level.com.web.shoppingweb=DEBUG
logging.level.org.springframework.security=DEBUG

spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=smtp
spring.mail.default-encoding=UTF-8
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
