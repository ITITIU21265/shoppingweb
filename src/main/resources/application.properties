spring.application.name=shoppingweb
server.port=8080

#database
spring.datasource.url=jdbc:mysql://localhost:3306/clothing_shop?useSSL=false&serverTimezone=UTC
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT Configuration
jwt.secret=mySecretKeyForJWTTokenGenerationAndValidationMustBeLongEnough256Bits
jwt.expiration=86400000

# Security
# Logging
logging.level.com.web.shoppingweb=DEBUG
logging.level.org.springframework.security=DEBUG
